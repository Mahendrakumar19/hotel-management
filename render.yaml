services:
  - type: web
    name: hotel-management-api
    env: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && cd frontend && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./hotel_management.db
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.onrender.com
      - key: REACT_APP_API_URL
        value: https://hotel-management-api.onrender.com/api
