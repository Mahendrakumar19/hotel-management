services:
  - type: web
    name: hotel-management-api
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./hotel_management.db
      - key: CORS_ORIGIN
        value: https://<frontend-service-name>.onrender.com
